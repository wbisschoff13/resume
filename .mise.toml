[tools]
typst = "0.14.2"

[tasks.build]
description = "Compile all Typst documents to PDF"
run = "typst compile cv.typ && typst compile cv_embedded.typ && typst compile cv_enterprise.typ && typst compile cover_letter.typ"

[tasks.build-cv]
description = "Compile general CV only"
run = "typst compile cv.typ"

[tasks.build-embedded]
description = "Compile embedded systems CV variant"
run = "typst compile cv_embedded.typ"

[tasks.build-enterprise]
description = "Compile enterprise CV variant"
run = "typst compile cv_enterprise.typ"

[tasks.build-cover-letter]
description = "Compile cover letter"
run = "typst compile cover_letter.typ"

[tasks.build-check]
description = "Validate all documents compile without errors (dry compile)"
run = "typst compile cv.typ && typst compile cv_embedded.typ && typst compile cv_enterprise.typ && typst compile cover_letter.typ"

[tasks.check]
description = "Run all verification checks (typecheck, format-check, compile)"
depends = ["check-compile", "format-check"]

[tasks.check-compile]
description = "Verify all documents compile without errors"
run = "typst compile cv.typ && typst compile cv_embedded.typ && typst compile cv_enterprise.typ && typst compile cover_letter.typ"

[tasks.format]
description = "Format all Typst source files (requires typst >= 0.13)"
run = "typst fmt content/data.typ lib/template.typ cv.typ cv_embedded.typ cv_enterprise.typ cover_letter.typ"

[tasks.format-check]
description = "Check formatting without modifying files (requires typst >= 0.13)"
run = "typst fmt --check content/data.typ lib/template.typ cv.typ cv_embedded.typ cv_enterprise.typ cover_letter.typ"

[tasks.lint]
description = "Validate Typst syntax via compilation check"
run = "echo 'Lint: compilation-based validation only (no dedicated linter in typst 0.14.2)' && typst compile cv.typ && typst compile cover_letter.typ"

[tasks.fix]
description = "Apply formatting fixes"
depends = ["format"]

[tasks.dev]
description = "Watch and recompile general CV on changes"
run = "typst watch cv.typ"

[tasks.dev-embedded]
description = "Watch and recompile embedded CV on changes"
run = "typst watch cv_embedded.typ"

[tasks.dev-enterprise]
description = "Watch and recompile enterprise CV on changes"
run = "typst watch cv_enterprise.typ"

[tasks.clean]
description = "Remove generated PDF artifacts"
run = "rm -f cv.pdf cv_embedded.pdf cv_enterprise.pdf cover_letter.pdf"

[tasks.setup]
description = "Verify mise toolchain and typst version"
run = "mise install && typst --version"

[tasks.help]
description = "List available mise tasks"
run = "mise tasks --no-header"
