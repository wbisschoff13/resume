name: Release CV

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        entry:
          - source: cv.typ
            output: cv.pdf
          - source: cv_embedded.typ
            output: cv_embedded.pdf
          - source: cv_enterprise.typ
            output: cv_enterprise.pdf
          - source: cover_letter.typ
            output: cover_letter.pdf
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install fonts
        run: |
          mkdir -p ~/.fonts
          cp fonts/*.ttf ~/.fonts/
          fc-cache -fv ~/.fonts

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Build ${{ matrix.entry.output }}
        run: typst compile ${{ matrix.entry.source }}

      - name: Upload ${{ matrix.entry.output }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.entry.output }}
          path: ${{ matrix.entry.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: CV ${{ steps.version.outputs.version }}
          body: |
            ## Werner Bisschoff - Curriculum Vitae

            **Version:** ${{ steps.version.outputs.version }}

            **Built from commit:** ${{ github.sha }}

            This release includes:
            - **Standard CV** - The full professional CV
            - **Embedded CV** - Tailored for embedded
            - **Enterprise CV** - Tailored for enterprise
            - **Cover Letter** - Professional cover letter
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
